name: Build Quickstart IPKs

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build Quickstart for ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [arm64, x64, mipsel]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Target Env
        run: |
          cat .github/workflows/${{ matrix.target }}.env >> "$GITHUB_ENV"

      - name: Setup Build Environment (Fixed)
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -y

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev \
          libssl-dev python3 python3-distutils rsync unzip \
          zlib1g-dev file wget libelf-dev ecj fastjar \
          java-propose-classpath libncursesw5-dev

      - name: Download Official OpenWrt SDK
        run: |
          wget ${SDK_URL}${SDK_NAME}.tar.xz
          mkdir sdk
          tar -xJf ${SDK_NAME}.tar.xz --strip-components=1 -C sdk

      - name: Configure Feeds (Official Only)
        run: |
          cd sdk
          cp feeds.conf.default feeds.conf

          # Add custom quickstart app
          echo "src-link custom $GITHUB_WORKSPACE/applications" >> feeds.conf

          cat feeds.conf

      - name: Update & Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install luci-app-quickstart

      - name: Config (Enable dependencies automatically)
        run: |
          cd sdk
          cat <<EOF > .config
          CONFIG_ALL=y
          CONFIG_ALL_NONSHARED=y
          CONFIG_PACKAGE_luci-app-quickstart=y
          EOF

          make defconfig

      - name: Download Sources
        run: |
          cd sdk
          make download -j$(nproc) V=s

      - name: Compile Quickstart + Dependencies
        run: |
          cd sdk
          make package/luci-app-quickstart/compile -j$(nproc) V=s

      - name: Upload IPKs
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-${{ matrix.target }}
          path: sdk/bin/packages/**/*.ipk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: quickstart-${{ github.run_id }}
          name: Quickstart Build ${{ github.run_id }}
          files: sdk/bin/packages/**/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
